
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakaker Business</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Tahoma, Arial, sans-serif;
            background:#f5f7fa;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            color:#333;
        }

        .box{
            text-align:center;
            background:#fff;
            padding:50px 70px;
            border-radius:18px;
            box-shadow:0 10px 30px rgba(0,0,0,.12);
        }

        h1{
            font-size:34px;
            color:#1e88e5;
            margin-bottom:20px;
        }

        p{
            font-size:20px;
            color:#666;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>🚧</h1>
    <h1>نعمل على تطوير الموقع</h1>
    <p>سيكون الموقع متاحًا قريبًا بإذن الله.</p>
</div>

</body>
</html>
